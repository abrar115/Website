
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: lightblue;
            color: #333;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #0056b3;
            margin-bottom: 20px;
        }

        
        .iframe-container {
            max-width: 90%;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        iframe {
            width: 100%;
            height: 80vh; 
            border: none;
            border-radius: 8px;
        }

        
        footer {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }

        footer a {
            color: #0056b3;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #003d80;
        }
    </style>
</head>

<body>
    <h1>Embedded PowerPoint Presentation</h1>
    <div class="iframe-container">
        <iframe src="https://1drv.ms/p/c/5c90714a71b1df23/IQQ0pff7-dStS7sa-svQVGRSASkxs7HXwVavV4RtgEFbtYs?em=2&amp;wdAr=1.3333333333333333" 
                title="PowerPoint Viewer">
      
        </iframe>
    </div>

    
</body>

</html>
